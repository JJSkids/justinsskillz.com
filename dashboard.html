<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Skillz | Student Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">

    <div class="dashboard-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-brand">Justin's Workspace</div>
            <nav class="sidebar-links">
                <a href="#" class="active">💻 Workspace</a>
                <a href="index.html">🏠 Home</a>
                <a href="admin.html" id="adminPortalLink" class="hidden admin-only-btn">🔑 Admin Portal</a>
            </nav>
            <button id="dashboardSignOutBtn" class="btn-signout">🚪 Log Out</button>
        </aside>

        <main class="workspace-content">
            <header class="workspace-header">
                <h2>Welcome back, <span id="userGreeting">Developer</span>!</h2>
                <p>Compile code, watch live sessions, and master logic structures.</p>
            </header>

            <div class="workspace-grid">
                
                <div class="left-workspace-col">
                    
                    <div class="panel live-stream-panel">
                        <div class="panel-header">
                            <span class="live-indicator-dot" id="liveDot"></span>
                            <h3>Live Classroom Feed</h3>
                        </div>
                        <div class="video-container" id="videoContainer">
                            <div class="stream-offline" id="streamOffline">
                                🎬 Class is currently offline. Check the events panel!
                            </div>
                            <iframe id="liveFrame" class="hidden" src="" allow="camera; microphone; fullscreen"></iframe>
                        </div>
                    </div>

                    <div class="panel ide-panel">
                        <div class="panel-header">
                            <h3>⚡ Live HTML/CSS Compiler</h3>
                            <button id="runCodeBtn" class="btn-primary">Run Code</button>
                        </div>
                        <div class="ide-container">
                            <div class="ide-editor">
                                <label>HTML/CSS Sandbox Input</label>
                                <textarea id="codeEditor" placeholder="<h1>Hello World</h1>&#10;<style>&#10;  h1 { color: #4f46e5; text-align: center; }&#10;</style>"></textarea>
                            </div>
                            <div class="ide-preview">
                                <label>Live Output Render</label>
                                <iframe id="ideOutput"></iframe>
                            </div>
                        </div>
                    </div>

                </div>

                <aside class="right-notification-sidebar">
                    <div class="panel notification-panel">
                        <div class="panel-header">
                            <h3>🔔 Live Feed & Events</h3>
                        </div>
                        <div class="notifications-list" id="notificationsList">
                            <div class="loading-spinner">Syncing feeds...</div>
                        </div>
                    </div>
                </aside>

            </div>
        </main>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
